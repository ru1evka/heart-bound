<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Сердце в переплёте</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="admin">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar__logo">
            <span>❦</span> Админ-панель
        </div>
        <nav class="sidebar__nav">
            <button class="sidebar__link is-active" data-tab="books">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
                Книги
            </button>
            <button class="sidebar__link" data-tab="blog">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                Блог
            </button>
            <button class="sidebar__link" data-tab="settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                Настройки
            </button>
            <a href="index.html" class="sidebar__link sidebar__link--back">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                На сайт
            </a>
            <button class="sidebar__link sidebar__link--logout" id="logoutBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                Выйти
            </button>
        </nav>
    </aside>

    <!-- Main content -->
    <main class="main">

        <!-- ===== Книги ===== -->
        <section class="tab-panel is-active" id="tab-books">
            <div class="panel-header">
                <h1>Управление книгами</h1>
                <button class="btn btn--primary" id="addBookBtn">+ Добавить книгу</button>
            </div>

            <div class="cards-list" id="booksList">
                <!-- Карточки книг рендерятся из JS -->
            </div>
        </section>

        <!-- ===== Блог ===== -->
        <section class="tab-panel" id="tab-blog">
            <div class="panel-header">
                <h1>Управление блогом</h1>
                <button class="btn btn--primary" id="addPostBtn">+ Добавить запись</button>
            </div>

            <div class="cards-list" id="postsList">
                <!-- Карточки постов рендерятся из JS -->
            </div>
        </section>

        <!-- ===== Настройки ===== -->
        <section class="tab-panel" id="tab-settings">
            <div class="panel-header">
                <h1>Настройки сайта</h1>
            </div>

            <form id="settingsForm" class="settings-form">
                <div class="settings-section">
                    <h3>Социальные сети</h3>
                    <p class="settings-hint">Оставьте поле пустым, чтобы скрыть кнопку на сайте</p>
                    <div class="form__group">
                        <label for="sTelegram">Telegram</label>
                        <input type="url" id="sTelegram" placeholder="https://t.me/username">
                    </div>
                    <div class="form__group">
                        <label for="sVk">ВКонтакте</label>
                        <input type="url" id="sVk" placeholder="https://vk.com/...">
                    </div>
                    <div class="form__group">
                        <label for="sInstagram">Instagram</label>
                        <input type="url" id="sInstagram" placeholder="https://instagram.com/...">
                    </div>
                    <div class="form__group">
                        <label for="sYoutube">YouTube</label>
                        <input type="url" id="sYoutube" placeholder="https://youtube.com/...">
                    </div>
                    <div class="form__group">
                        <label for="sTiktok">TikTok</label>
                        <input type="url" id="sTiktok" placeholder="https://tiktok.com/@...">
                    </div>
                    <div class="form__group">
                        <label for="sDzen">Дзен</label>
                        <input type="url" id="sDzen" placeholder="https://dzen.ru/...">
                    </div>
                </div>

                <div class="settings-section">
                    <h3>Telegram-канал и QR-код</h3>
                    <div class="form__group">
                        <label for="sTgChannel">Ссылка на канал/чат</label>
                        <input type="url" id="sTgChannel" placeholder="https://t.me/channel">
                    </div>
                    <div class="form__group">
                        <label for="sTgUsername">Юзернейм (отображается под QR)</label>
                        <input type="text" id="sTgUsername" placeholder="@username">
                    </div>
                    <div class="form__group">
                        <label>QR-код (загрузить своё изображение)</label>
                        <div class="upload-area" id="qrUploadArea">
                            <input type="file" id="qrFileInput" accept="image/*" hidden>
                            <div class="upload-area__preview" id="qrPreview"></div>
                            <button type="button" class="btn btn--small btn--ghost" id="qrUploadBtn">Загрузить QR-код</button>
                            <button type="button" class="btn btn--small btn--danger" id="qrRemoveBtn" style="display:none">Удалить</button>
                            <p class="upload-area__hint">Если не загружен — генерируется автоматически из ссылки</p>
                        </div>
                        <input type="hidden" id="sQrImage">
                    </div>
                </div>

                <div class="settings-section">
                    <h3>Платформы</h3>
                    <div class="form__group">
                        <label for="sPlatformLitnet">Литнет (профиль автора)</label>
                        <input type="url" id="sPlatformLitnet" placeholder="https://litnet.com/...">
                    </div>
                    <div class="form__group">
                        <label for="sPlatformLitgorod">ЛитГород (профиль автора)</label>
                        <input type="url" id="sPlatformLitgorod" placeholder="https://litgorod.ru/...">
                    </div>
                    <div class="form__group">
                        <label for="sPlatformLitres">Литрес (профиль автора)</label>
                        <input type="url" id="sPlatformLitres" placeholder="https://www.litres.ru/...">
                    </div>
                </div>

                <div class="settings-section">
                    <h3>Об авторе</h3>
                    <div class="form__group">
                        <label for="sAuthorName">Имя автора</label>
                        <input type="text" id="sAuthorName" placeholder="Рена Руд">
                    </div>
                    <div class="form__group">
                        <label for="sAuthorText1">Первый абзац</label>
                        <textarea id="sAuthorText1" rows="3" placeholder="О себе..."></textarea>
                    </div>
                    <div class="form__group">
                        <label for="sAuthorText2">Второй абзац</label>
                        <textarea id="sAuthorText2" rows="3" placeholder="Что пишу..."></textarea>
                    </div>
                    <div class="form__group">
                        <label>Фото автора</label>
                        <div class="upload-area" id="authorUploadArea">
                            <input type="file" id="authorFileInput" accept="image/*" hidden>
                            <div class="upload-area__preview" id="authorPreview"></div>
                            <button type="button" class="btn btn--small btn--ghost" id="authorUploadBtn">Загрузить фото</button>
                            <button type="button" class="btn btn--small btn--danger" id="authorRemoveBtn" style="display:none">Удалить</button>
                        </div>
                        <input type="hidden" id="sAuthorPhoto">
                    </div>
                </div>

                <div class="settings-section">
                    <h3>Контакты</h3>
                    <div class="form__group">
                        <label for="sEmail">Email</label>
                        <input type="email" id="sEmail" placeholder="hello@example.com">
                    </div>
                </div>

                <div class="form__actions">
                    <button type="submit" class="btn btn--primary">Сохранить настройки</button>
                </div>
            </form>
        </section>

    </main>
</div>

<!-- ===== Модалка: Книга ===== -->
<div class="modal-overlay" id="bookModal">
    <div class="modal-box">
        <div class="modal-box__header">
            <h2 id="bookModalTitle">Добавить книгу</h2>
            <button class="modal-box__close" data-close-modal="bookModal">×</button>
        </div>
        <form id="bookForm" class="form">
            <input type="hidden" id="bookId">
            <div class="form__group">
                <label for="bookTitle">Название</label>
                <input type="text" id="bookTitle" placeholder="Шёпот зимних роз" required>
            </div>
            <div class="form__row">
                <div class="form__group">
                    <label for="bookGenre">Жанр</label>
                    <input type="text" id="bookGenre" placeholder="Современный роман · Драма">
                </div>
                <div class="form__group">
                    <label for="bookBadge">Бейдж</label>
                    <select id="bookBadge">
                        <option value="">Без бейджа</option>
                        <option value="Новинка">Новинка</option>
                        <option value="Бестселлер">Бестселлер</option>
                        <option value="Бесплатно">Бесплатно</option>
                        <option value="Эксклюзив">Эксклюзив</option>
                        <option value="Скоро">Скоро</option>
                    </select>
                </div>
            </div>
            <div class="form__group">
                <label for="bookDesc">Краткое описание</label>
                <input type="text" id="bookDesc" placeholder="Она искала тишину...">
            </div>
            <div class="form__group">
                <label for="bookPrologue">Текст аннотации</label>
                <textarea id="bookPrologue" rows="8" placeholder="Снег падал так тихо..."></textarea>
            </div>
            <div class="form__row">
                <div class="form__group">
                    <label for="bookLitnet">Ссылка Литнет</label>
                    <input type="url" id="bookLitnet" placeholder="https://litnet.com/...">
                </div>
                <div class="form__group">
                    <label for="bookLitgorod">Ссылка ЛитГород</label>
                    <input type="url" id="bookLitgorod" placeholder="https://litgorod.ru/...">
                </div>
            </div>
            <div class="form__group">
                <label for="bookLitres">Ссылка Литрес</label>
                <input type="url" id="bookLitres" placeholder="https://www.litres.ru/...">
            </div>
            <div class="form__group">
                <label for="bookBtnType">Текст кнопок на платформах</label>
                <select id="bookBtnType">
                    <option value="buy">Купить</option>
                    <option value="free">Читать бесплатно</option>
                </select>
            </div>
            <div class="form__group">
                <label>Обложка (загрузить файл: jpg, png, gif, mp4)</label>
                <div class="upload-area" id="coverUploadArea">
                    <input type="file" id="coverFileInput" accept="image/*,video/mp4,video/webm,.gif" hidden>
                    <div class="upload-area__preview" id="coverPreview"></div>
                    <button type="button" class="btn btn--small btn--ghost" id="coverUploadBtn">Загрузить обложку</button>
                    <button type="button" class="btn btn--small btn--danger" id="coverRemoveBtn" style="display:none">Удалить</button>
                </div>
                <input type="hidden" id="bookCover">
                <div class="form__group" style="margin-top:8px">
                    <label for="bookCoverUrl">Или вставьте URL</label>
                    <input type="text" id="bookCoverUrl" placeholder="https://... или assets/...">
                </div>
            </div>
            <div class="form__group">
                <label for="bookColor">Цвет фона обложки (если нет файла)</label>
                <input type="color" id="bookColor" value="#9a3f55">
            </div>
            <div class="form__actions">
                <button type="button" class="btn btn--ghost" data-close-modal="bookModal">Отмена</button>
                <button type="submit" class="btn btn--primary">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<!-- ===== Модалка: Блог ===== -->
<div class="modal-overlay" id="postModal">
    <div class="modal-box">
        <div class="modal-box__header">
            <h2 id="postModalTitle">Добавить запись</h2>
            <button class="modal-box__close" data-close-modal="postModal">×</button>
        </div>
        <form id="postForm" class="form">
            <input type="hidden" id="postId">
            <div class="form__group">
                <label for="postTitle">Заголовок</label>
                <input type="text" id="postTitle" placeholder="Как рождалась героиня..." required>
            </div>
            <div class="form__group">
                <label for="postDate">Дата</label>
                <input type="date" id="postDate">
            </div>
            <div class="form__group">
                <label for="postContent">Текст записи</label>
                <textarea id="postContent" rows="6" placeholder="Иногда персонаж сам стучится в дверь..."></textarea>
            </div>
            <div class="form__group">
                <label for="postLink">Ссылка «Читать далее» (необязательно)</label>
                <input type="text" id="postLink" placeholder="#">
            </div>
            <div class="form__actions">
                <button type="button" class="btn btn--ghost" data-close-modal="postModal">Отмена</button>
                <button type="submit" class="btn btn--primary">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<script src="admin.js"></script>
</body>
</html>
