<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a2a"/>
      <stop offset=".5" stop-color="#5a1a4a"/>
      <stop offset="1" stop-color="#1a0a3a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#g4)"/>
  <!-- неоновый свет -->
  <ellipse cx="300" cy="400" rx="200" ry="100" fill="#ff3d7f" opacity=".25">
    <animate attributeName="opacity" values=".25;.5;.25" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="300" cy="400" rx="120" ry="60" fill="#3dd9ff" opacity=".25">
    <animate attributeName="opacity" values=".25;.5;.25" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </ellipse>
  <!-- силуэт -->
  <g transform="translate(300 450)" fill="#0a0a2a">
    <ellipse cx="0" cy="-110" rx="22" ry="26"/>
    <path d="M-30 -80 Q-50 -20 -45 60 L-15 60 L-10 -20 Z"/>
    <path d="M30 -80 Q50 -20 45 60 L15 60 L10 -20 Z"/>
    <path d="M-15 -20 L-25 100 L25 100 L15 -20 Z"/>
  </g>
  <!-- частицы -->
  <g fill="#fff">
    <circle cx="100" cy="200" r="1.5"><animate attributeName="cy" values="200;180;200" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" values=".3;1;.3" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="250" r="2"><animate attributeName="cy" values="250;230;250" dur="4s" repeatCount="indefinite"/><animate attributeName="opacity" values=".3;1;.3" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="350" r="1.2"><animate attributeName="opacity" values=".3;1;.3" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="450" cy="150" r="1.8"><animate attributeName="opacity" values=".3;1;.3" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="50" cy="500" r="2"><animate attributeName="opacity" values=".3;1;.3" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="550" cy="600" r="1.5"><animate attributeName="opacity" values=".3;1;.3" dur="3.2s" repeatCount="indefinite"/></circle>
  </g>
  <!-- неоновые линии -->
  <line x1="0" y1="650" x2="600" y2="650" stroke="#ff3d7f" stroke-width="2" opacity=".6">
    <animate attributeName="opacity" values=".6;.2;.6" dur="2s" repeatCount="indefinite"/>
  </line>
  <text x="300" y="710" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="32" fill="#fff">Танец на грани</text>
  <text x="300" y="745" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="32" fill="#3dd9ff">рассвета</text>
  <text x="300" y="775" text-anchor="middle" font-family="Arial" font-size="13" letter-spacing="4" fill="#ff3d7f">АННА ВЕРЕСЕНЬ</text>
</svg>
