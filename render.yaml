services:
  - type: web
    name: heart-in-book
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    disk:
      name: site-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/data.db
      - key: UPLOADS_DIR
        value: /data/uploads
      - key: ADMIN_LOGIN
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: RENDER_EXTERNAL_URL
        sync: false
